<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Blitz</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      color: #111827;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      background-color: #f9fafb;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #0f2a4a;
      margin-top: 0;
    }

    p {
      color: #4b5563;
    }

    .links {
      margin-top: 40px;
      border-top: 1px solid #e5e7eb;
      padding-top: 20px;
    }

    a {
      color: #2563eb;
      text-decoration: none;
      margin-right: 20px;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Birthday Blitz</h1>
    <p>Never forget a birthday again. Birthday Blitz is a simple, beautiful Chrome Extension that helps you add
      birthdays directly to your Google Calendar in seconds.</p>
  </div>
</body>

</html>
